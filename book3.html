<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vol. III 療癒</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* ===== iPhone 偽橫屏 ===== */
.wrapper {
    position: fixed;
    width: 100vh;
    height: 100vw;
    top: 0;
    left: 0;
    transform: rotate(90deg) translateY(-100%);
    transform-origin: top left;
}

/* 主畫面 */
.viewer {
    width: 100vh;
    height: 100vw;
    display: flex;
    flex-direction: column;
}

/* 黑邊 */
.top-bar {
    height: 4vh;
}

.bottom-bar {
    height: 6vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 返回 */
.back-btn {
    color: #8df7f1;
    font-size: 12px;
    text-decoration: none;
    opacity: 0.8;
}

/* 圖片區 */
.stage {
    flex: 1;
    position: relative;
}

/* 圖片 */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.page.active {
    opacity: 1;
}

/* 點擊區 */
.nav {
    position: absolute;
    top: 0;
    width: 25%;
    height: 100%;
    z-index: 10;
    opacity: 0;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

/* ===== 🔥 提示遮罩 ===== */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5); /* 50%黑 */
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 20;
    font-size: 16px;
    padding: 20px;
}

/* Android / 桌機正常 */
@media screen and (orientation: landscape) {
    .wrapper {
        transform: none;
        width: 100vw;
        height: 100vh;
    }

    .viewer {
        width: 100vw;
        height: 100vh;
    }
}
</style>
</head>

<body>

<audio id="bgm" loop></audio>

<div class="wrapper">

    <div class="viewer">

        <div class="top-bar"></div>

        <div class="stage">

            <!-- 🔥 提示（壓在第一張） -->
            <div class="overlay" id="overlay" onclick="hideOverlay()">
                建議橫向閱讀以獲得最佳體驗<br><br>（ 點擊繼續 ）
            </div>

            <!-- 圖片 -->
            <img src="image/201gif.gif" class="page active">
            <img src="image/201.png" class="page">
            <img src="image/202.png" class="page">
            <img src="image/203.png" class="page">
            <img src="image/204.png" class="page">
            <img src="image/205.png" class="page">
            <img src="image/206.png" class="page">
            <img src="image/207.png" class="page">
            <img src="image/208.png" class="page">
            <img src="image/209.png" class="page">
            <img src="image/210.png" class="page">
            <img src="image/211.png" class="page">
            <img src="image/212.png" class="page">
            <img src="image/213.png" class="page">
            <img src="image/214.png" class="page">
            <img src="image/215.png" class="page">
            <img src="image/216.png" class="page">
            <img src="image/217.png" class="page">
            <img src="image/218.png" class="page">
            <img src="image/219.png" class="page">
            <img src="image/220.png" class="page">
            <img src="image/221.png" class="page">
            <img src="image/222.png" class="page">
            <img src="image/223.png" class="page">
            <img src="image/224.png" class="page">
            


            <!-- 點擊區 -->
            <div class="nav left" onclick="prevPage()"></div>
            <div class="nav right" onclick="nextPage()"></div>

        </div>

        <div class="bottom-bar">
            <a href="index.html" class="back-btn">← 返回首頁</a>
        </div>

    </div>

</div>

<script>

/* 音樂同步播放 */
const bgm = document.getElementById("bgm");

const playing = localStorage.getItem("musicPlaying") === "true";
const music = localStorage.getItem("currentMusic") || "33333333.mp3";

bgm.src = music;

if (playing) {
    bgm.play().catch(()=>{});
}

let current = 0;
const pages = document.querySelectorAll(".page");

/* 顯示頁 */
function showPage(index) {
    pages.forEach(p => p.classList.remove("active"));
    pages[index].classList.add("active");
}

/* 翻頁 */
function nextPage() {
    if (current < pages.length - 1) {
        current++;
        showPage(current);
    }
}

function prevPage() {
    if (current > 0) {
        current--;
        showPage(current);
    }
}

/* 🔥 關閉提示 */
function hideOverlay() {
    document.getElementById("overlay").style.display = "none";
}

/* 滑動 */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextPage();
    if (endX - startX > 50) prevPage();
});
</script>

</body>
</html>
